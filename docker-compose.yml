services:
  gpt-image2-web:
    image: gpt-image2-web:latest
    build: .
    env_file:
      - .env
    environment:
      GPT_IMAGE2_UI_MODE: configurable
      IMAGE_JOB_DB_PATH: /app/data/image-jobs.sqlite
      APP_DB_PATH: /app/data/app.sqlite
    volumes:
      - gpt-image2-web-jobs:/app/data
    ports:
      - "3000:3000"
    restart: unless-stopped

  gpt-image2-sealed:
    image: gpt-image2-web:latest
    env_file:
      - .env
    environment:
      GPT_IMAGE2_UI_MODE: sealed
      BILLING_ENABLED: ${SEALED_BILLING_ENABLED:-false}
      APP_BASE_URL: ${SEALED_APP_BASE_URL:-http://localhost:3001}
      IMAGE_JOB_DB_PATH: /app/data/image-jobs.sqlite
      APP_DB_PATH: /app/data/app.sqlite
    volumes:
      - gpt-image2-sealed-jobs:/app/data
    ports:
      - "3001:3000"
    restart: unless-stopped

volumes:
  gpt-image2-web-jobs:
  gpt-image2-sealed-jobs:
